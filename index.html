<!-- HERO -->
<section id="hero">
  <div class="hero-inner">
    <h1><em id="hero-title"></em></h1>
    <h2 id="hero-subtitle"></h2>
    <h3 id="hero-sub"></h3>

    <div class="diskon-syarat" id="countdown-wrapper">
      <p class="countdown-label" id="countdown-label"></p>
      <div class="countdown" id="countdown-display">
        <div class="cd-box"><span class="cd-num" id="cd-d">00</span><span class="cd-unit">Hari</span></div>

      </div>
      <p class="countdown-label" id="countdown-label-2"></p>
      <div class="hero-badge2" id="hero-badge2"></div>
    </div>

    <div class="hero-chips" id="hero-chips"></div>

    <div class="hero-cta-row" id="hero-cta-row"></div>
  </div>
</section>

  </div>
</section>

<!-- HARGA -->

        <iframe id="maps-iframe" src="" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

    </div>
  </div>
</section>

<!-- KONTAK -->
